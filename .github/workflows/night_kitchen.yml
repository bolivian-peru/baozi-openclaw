name: Night Kitchen Agent

on:
  schedule:
    # Runs at 12:00 UTC every day
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install dependencies
      run: npm ci

    - name: Build
      run: npx tsc

    - name: Run Night Kitchen Agent
      env:
        OPENCLAW_LLM_API_KEY: ${{ secrets.OPENCLAW_LLM_API_KEY }}
        WALLET_PUBLIC_KEY: ${{ secrets.WALLET_PUBLIC_KEY }}
        SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
      run: node dist/scripts/night-kitchen.js
